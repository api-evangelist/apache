  - type: Blog
    url: https://news.apache.org
  - type: Support
    url: https://www.apache.org/foundation/mailinglists.html
  - type: TermsOfService
    url: https://www.apache.org/licenses/
  - type: Features
    data:
      - name: 300+ Open Source Projects
        description: >-
          Home to over 300 open source projects spanning big data, cloud
          infrastructure, messaging, databases, web frameworks, and more.
      - name: Apache License
        description: >-
          All ASF software is released under the Apache License 2.0, a
          permissive open source license compatible with most ecosystems.
      - name: Global Community
        description: >-
          Maintained by 9,900+ committers and 1,190+ members from around the
          world operating under the principle of community over code.
      - name: Project Incubator
        description: >-
          The Apache Incubator provides mentorship and infrastructure for
          new open source projects seeking to join the ASF ecosystem.
      - name: Release Management
        description: >-
          The ASF manages 1,300+ software releases with formal release voting
          and cryptographic signing processes ensuring software integrity.
  - type: UseCases
    data:
      - name: Big Data Processing
        description: >-
          Process and analyze large-scale datasets using Apache Hadoop, Spark,
          Flink, Kafka, Arrow, and related ecosystem tools.
      - name: API Gateway and Traffic Management
        description: >-
          Route and manage API traffic with Apache APISIX and other gateway
          projects from the Apache ecosystem.
      - name: Workflow Orchestration
        description: >-
          Schedule and monitor data pipelines and workflows using Apache Airflow,
          Oozie, and related orchestration tools.
      - name: Message Streaming
        description: >-
          Build event-driven architectures using Apache Kafka, ActiveMQ, and
          Pulsar for high-throughput message streaming.
      - name: Database and Storage
        description: >-
          Store and query data with Apache Cassandra, HBase, Accumulo, CouchDB,
          and other distributed database projects.
  - type: Integrations
    data:
      - name: Cloud Platforms
        description: >-
          Apache projects integrate with AWS, Azure, and Google Cloud for
          cloud-native deployments and managed service offerings.
      - name: Kubernetes
        description: >-
          Many ASF projects support Kubernetes deployments via Helm charts
          and Kubernetes operators for containerized workloads.
      - name: Java Ecosystem
        description: >-
          Deep integration with the Java ecosystem including Maven, Gradle,
          and major JVM frameworks and runtime environments.
      - name: Python Ecosystem
        description: >-
          Apache projects like Airflow, Arrow, and Superset provide
          first-class Python support and PyPI packages.
