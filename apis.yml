aid: apache
name: Apache Software Foundation
description: >-
  The Apache Software Foundation (ASF) is a 501(c)(3) nonprofit organization
  that provides open source software for the public good. Home to more than 300
  open source projects maintained by a global community of over 9,900 committers
  and 1,190 members, the ASF operates under the principle of community over code.
  Projects span big data, cloud infrastructure, messaging, web frameworks,
  databases, build tooling, machine learning, and more — all released under the
  Apache License.
